<svg xmlns="http://www.w3.org/2000/svg" width="640" height="280" viewBox="0 0 640 280" font-family="system-ui,sans-serif">
<rect width="100%" height="100%" fill="#f8f9fa"/>
<text x="320" y="30" text-anchor="middle" font-size="15" fill="#222">Number-on-Forehead: each player sees all but their own value</text>
<circle cx="160" cy="140" r="44" fill="#1a5276" opacity="0.9"/>
<text x="160" y="146" text-anchor="middle" fill="white" font-size="14">Alice</text>
<circle cx="320" cy="200" r="44" fill="#117a65" opacity="0.9"/>
<text x="320" y="206" text-anchor="middle" fill="white" font-size="14">Bob</text>
<circle cx="480" cy="140" r="44" fill="#7d3c98" opacity="0.9"/>
<text x="480" y="146" text-anchor="middle" fill="white" font-size="14">Charlie</text>
<text x="480" y="202" text-anchor="middle" font-size="10" fill="#555">sees Alice, Bob</text>
<defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><polygon points="0 0, 8 4, 0 8" fill="#666"/></marker></defs>
<path d="M 200 120 Q 320 60 440 120" fill="none" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
</svg>